    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mi Sistema ERP</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Icons -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

        <!-- Estilos personalizados -->
        <link href="assets/css/styles.css" rel="stylesheet">        
    </head>

    <body>

    <!-- HEADER -->
    <header class="topbar d-flex align-items-center">
        <!-- Logo -->
        <div class="topbar-left d-flex align-items-center justify-content-between px-2">
            <img id="logo" src="assets/img/logo.png" height="40">

            <button class="btn btn-sm btn-outline-light" id="toggleSidebar">
                <i class="bi bi-list"></i>
            </button>
        </div>
        <!-- Seccion -->
        <div class="topbar-center flex-grow-1 px-3">
            <h5 class="m-0 text-white" id="page-title">
                Dashboard
            </h5>
        </div>

        <!-- Usuario -->
        <div class="topbar-right px-3">

            <div class="dropdown">
                <!--<div class="d-flex align-items-center dropdown-toggle text-white"
                     data-bs-toggle="dropdown" style="cursor:pointer;">

                    <img src="assets/img/user.png" class="rounded-circle me-2" height="35">
                    <span class="d-none d-md-inline">Francisco</span>
                </div>-->

                <div class="dropdown">
                    <div class="d-flex align-items-center dropdown-toggle text-white"
                         data-bs-toggle="dropdown" style="cursor:pointer;">

                        <img src="assets/img/user.png" class="rounded-circle me-2" height="35">
                        <span class="d-none d-md-inline">Francisco</span>
                    </div>
                    <div class="dropdown-menu dropdown-menu-end user-dropdown p-0 shadow">
                        <!--FOTO GRANDE -->
                        <div class="user-header text-center p-3">
                            <img src="assets/img/user.png" class="user-avatar">
                        </div>
                        <!--NOMBRE Y PUESTO -->
                        <div class="text-center pb-2">
                            <div class="fw-bold">Francisco</div>
                            <small class="text-muted">Administrador</small>
                        </div>
                        <!--ACCIONES -->
                        <div class="user-actions text-center pb-3">
                            <button class="btn btn-light rounded-circle logout-btn"
                                    data-bs-toggle="tooltip"
                                    data-bs-placement="bottom"
                                    title="Cerrar sesión">

                                <i class="bi bi-power text-danger"></i>
                            </button>

                        </div>

                    </div>

                </div>
            </div>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="d-flex">
        <!-- SIDEBAR -->
        <aside class="sidebar p-2" id="sidebar">

            <ul class="nav flex-column">

                <!-- Dashboard -->
                <li class="nav-item">
                    <a href="#" class="nav-link" data-bs-toggle="tooltip" data-bs-placement="right" title="Dashboard" onclick="cargarVista('dashboard','index')">
                        <i class="bi bi-speedometer2 me-2"></i>
                        <span class="menu-text">Dashboard</span>
                    </a>
                </li>

                <!-- Usuarios -->
                <li class="nav-item">
                    <a href="#" class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="tooltip" data-bs-placement="right" title="Usuarios" onclick="toggleSubmenu(this)">
                        <span>
                            <i class="bi bi-people me-2"></i>
                            <span class="menu-text">Usuarios</span>
                        </span>
                        <i class="bi bi-chevron-down"></i>
                    </a>

                    <ul class="submenu ps-3">
                        <li>
                            <a href="#" class="nav-link" onclick="cargarVista('usuarios','listado')">
                                Listado
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link" onclick="cargarVista('usuarios','form')">
                                Nuevo usuario
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- Servicios -->
                <li class="nav-item">
                    <a href="#" class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="tooltip" data-bs-placement="right" title="Servicios" onclick="toggleSubmenu(this)">
                        <span>
                            <i class="bi bi-truck me-2"></i>
                            <span class="menu-text">Servicios</span>
                        </span>
                        <i class="bi bi-chevron-down"></i>
                    </a>

                    <ul class="submenu ps-3">
                        <li>
                            <a href="#" class="nav-link" onclick="cargarVista('servicios','listado')">
                                Listado
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link" onclick="cargarVista('servicios','detalle')">
                                Detalle
                            </a>
                        </li>
                    </ul>
                </li>

            </ul>

        </aside>

        <!-- 📄 CONTENIDO DINÁMICO -->
        <main class="content flex-grow-1 p-3" id="app-content">
            <h4>Bienvenido al sistema</h4>
        </main>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Funciones de la pantalla principal -->
    <script src="assets/js/main.js"></script>


</body>
</html>
